name: Purge jsDelivr Cache
on:
  push:
    paths: ['data/**', 'dist/**']
jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/implicator-ai/ai-top-40@main/data/latest.json"
          curl -s "https://purge.jsdelivr.net/gh/implicator-ai/ai-top-40@main/dist/embed.min.js"
          echo "Cache purged"
